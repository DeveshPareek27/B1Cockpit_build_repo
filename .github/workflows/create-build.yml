name: Create Electron Build

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout Build Repository (this repository)
      # ---------------------------------------------------------------
      - name: Checkout Build Repository
        uses: actions/checkout@v4
        with:
          path: BuildRepository

      # ---------------------------------------------------------------
      # 2. Checkout ENT_B1_Cockpit
      # ---------------------------------------------------------------
      - name: Checkout ENT_B1_Cockpit
        uses: actions/checkout@v4
        with:
          repository: entitecdev3/ENT_B1_Cockpit
          ref: main
          path: ENT_B1_Cockpit
          token: ${{ secrets.PAT_TOKEN }}

      # ---------------------------------------------------------------
      # 3. Checkout ENT_B1_Scripts
      # ---------------------------------------------------------------
      - name: Checkout ENT_B1_Scripts
        uses: actions/checkout@v4
        with:
          repository: entitecdev3/ENT_B1_Scripts
          ref: main
          path: ENT_B1_Scripts
          token: ${{ secrets.PAT_TOKEN }}

      # ---------------------------------------------------------------
      # 4. Checkout ENT_RED_CustomNodes
      # ---------------------------------------------------------------
      - name: Checkout ENT_RED_CustomNodes
        uses: actions/checkout@v4
        with:
          repository: entitecdev3/ENT_RED_CustomNodes
          ref: main
          path: ENT_RED_CustomNodes
          token: ${{ secrets.PAT_TOKEN }}

      # ---------------------------------------------------------------
      # 5. Setup Node.js
      # ---------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------------------------------------------------------------
      # 6. Debug Workspace
      # ---------------------------------------------------------------
      - name: Debug Workspace
        shell: pwsh
        run: |
          Write-Host "Workspace:"
          Get-ChildItem $env:GITHUB_WORKSPACE

          Write-Host ""
          Write-Host "ENT_B1_Cockpit"
          Get-ChildItem "$env:GITHUB_WORKSPACE\ENT_B1_Cockpit"

          Write-Host ""
          Write-Host "ENT_B1_Scripts"
          Get-ChildItem "$env:GITHUB_WORKSPACE\ENT_B1_Scripts"

          Write-Host ""
          Write-Host "ENT_RED_CustomNodes"
          Get-ChildItem "$env:GITHUB_WORKSPACE\ENT_RED_CustomNodes"

      # ---------------------------------------------------------------
      # 7. Create Config File
      # ---------------------------------------------------------------
      - name: Override Config Paths for CI
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          $buildRepo = "$ws\BuildRepository"

          $content = @"
          PROJECT=ENT_B1_Cockpit
          UI5_PATH=$ws\ENT_B1_Cockpit
          API_PATH=$ws
          SCRIPT_PATH=$ws\ENT_B1_Scripts
          CUSTOM_NODE_PATH=$ws\ENT_RED_CustomNodes
          UI_BUILD_PATH=$buildRepo\Utils
          Build_Dir=B1Cockpit_Build
          COPY_DEST_PATH=
          "@

          [System.IO.File]::WriteAllText(
              "$buildRepo\Electron_build_Scripts\0_0_Config.env",
              $content.Trim(),
              [System.Text.Encoding]::ASCII
          )

          Write-Host "Generated Config:"
          Get-Content "$buildRepo\Electron_build_Scripts\0_0_Config.env"

      # ---------------------------------------------------------------
      # 8. Validate Required Files
      # ---------------------------------------------------------------
      - name: Validate Required Files
        shell: pwsh
        run: |
          $required = @(
            "$env:GITHUB_WORKSPACE\ENT_B1_Cockpit\flow.json",
            "$env:GITHUB_WORKSPACE\ENT_B1_Cockpit\version.json",
            "$env:GITHUB_WORKSPACE\ENT_B1_Cockpit\webapp"
          )

          $missing = $false

          foreach ($file in $required) {
            if (Test-Path $file) {
              Write-Host "[OK] $file"
            } else {
              Write-Host "[MISSING] $file"
              $missing = $true
            }
          }

          if ($missing) {
            exit 1
          }

      # ---------------------------------------------------------------
      # 9. Run Build
      # ---------------------------------------------------------------
      - name: Run createBuild.bat
        shell: cmd
        run: |
          call BuildRepository\Electron_build_Scripts\createBuild.bat

      # ---------------------------------------------------------------
      # 10. Upload Installer
      # ---------------------------------------------------------------
      - name: Upload Installer Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ElectronInstaller
          path: BuildRepository\Electron_build_Scripts\ENT_B1_Cockpit-Installer-*.exe
          if-no-files-found: warn

      # ---------------------------------------------------------------
      # 11. Create GitHub Release
      # ---------------------------------------------------------------
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: BuildRepository/Electron_build_Scripts/ENT_B1_Cockpit-Installer-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
