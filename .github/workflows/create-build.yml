name: Create Electron Build

on:
  # Trigger manually from the GitHub Actions tab
  workflow_dispatch:

  # Also trigger automatically on every push to main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout the full repository
      # ---------------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # If these are private repositories, uncomment below and add a PAT (Personal Access Token) to your repository secrets:
          token: ${{ secrets.PAT_TOKEN }}

      # ---------------------------------------------------------------
      # 2. Set up Node.js
      # ---------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Debug Repository
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE

          Write-Host "Workspace: $ws"
          Write-Host "=============================="

          Get-ChildItem $ws

          Write-Host "=============================="
          Write-Host "ENT_B1_Cockpit exists?"

          Test-Path "$ws\ENT_B1_Cockpit"

          if (Test-Path "$ws\ENT_B1_Cockpit") {
            Get-ChildItem "$ws\ENT_B1_Cockpit"
          }

#  2.1
      - name: Verify Submodules
        shell: pwsh
        run: |
          git submodule status

          Get-ChildItem "$env:GITHUB_WORKSPACE\ENT_B1_Cockpit"

          Test-Path "$env:GITHUB_WORKSPACE\ENT_B1_Cockpit\flow.json"
      # ---------------------------------------------------------------
      # 3. Override 0_0_Config.env with GitHub runner paths
      #    Written with LF-only line endings to prevent the classic
      #    Windows batch bug where for /f picks up \r from CRLF files,
      #    silently corrupting path variables.
      # ---------------------------------------------------------------
      - name: Override Config Paths for CI
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          # Use LF-only (\n) — NOT CRLF (\r\n) — to avoid trailing \r in bat variables
          $content = "PROJECT=ENT_B1_Cockpit`nUI5_PATH=$ws\ENT_B1_Cockpit`nAPI_PATH=$ws`nUI_BUILD_PATH=$ws\Utils`nBuild_Dir=B1Cockpit_Build`nCOPY_DEST_PATH="
          [System.IO.File]::WriteAllText(
            "$env:GITHUB_WORKSPACE\Electron_build_Scripts\0_0_Config.env",
            $content,
            [System.Text.Encoding]::ASCII
          )
          Write-Host "[INFO] Config written (LF line endings):"
          Get-Content "$env:GITHUB_WORKSPACE\Electron_build_Scripts\0_0_Config.env"

      # ---------------------------------------------------------------
      # 4. Validate required source files exist before building
      # ---------------------------------------------------------------

      - name: Debug ENT_B1_Cockpit
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE

          Write-Host "Folder exists:"
          Test-Path "$ws\ENT_B1_Cockpit"

          Write-Host ""
          Write-Host "Contents:"
          Get-ChildItem "$ws\ENT_B1_Cockpit"

          Write-Host ""
          Write-Host "flow.json:"
          Test-Path "$ws\ENT_B1_Cockpit\flow.json"

          Write-Host "version.json:"
          Test-Path "$ws\ENT_B1_Cockpit\version.json"

          Write-Host "webapp:"
          Test-Path "$ws\ENT_B1_Cockpit\webapp"

      # - name: Validate Required Files
      #   shell: pwsh
      #   run: |
      #     $ws = $env:GITHUB_WORKSPACE
      #     $required = @(
      #       "$ws\ENT_B1_Cockpit\flow.json",
      #       "$ws\ENT_B1_Cockpit\version.json",
      #       "$ws\ENT_B1_Cockpit\webapp"
      #     )
      #     $missing = $false
      #     foreach ($path in $required) {
      #       if (Test-Path $path) {
      #         Write-Host "[OK]      $path"
      #       } else {
      #         Write-Host "[MISSING] $path"
      #         $missing = $true
      #       }
      #     }
      #     if ($missing) { exit 1 }

      # ---------------------------------------------------------------
      # 5. Run the build script
      #    CI=true is set by GitHub Actions — all `pause` commands
      #    in the bat file check `if not defined CI` and are skipped.
      # ---------------------------------------------------------------
      - name: Run createBuild.bat
        shell: cmd
        run: |
          call Electron_build_Scripts\createBuild.bat

      # ---------------------------------------------------------------
      # 5. Upload the generated installer as a downloadable artifact
      # ---------------------------------------------------------------
      - name: Upload Installer Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ElectronInstaller
          path: Electron_build_Scripts\ENT_B1_Cockpit-Installer-*.exe
          if-no-files-found: warn
