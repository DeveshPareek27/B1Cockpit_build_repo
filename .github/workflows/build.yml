name: Move Utils Files

on:
  push:
    paths:
      - 'utils/**'

jobs:
  move-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Move Files
        run: |
          mkdir -p archive
          mv utils/* archive/ || true

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .
          git diff --staged --quiet || git commit -m "Move utils files to archive"
          git push
