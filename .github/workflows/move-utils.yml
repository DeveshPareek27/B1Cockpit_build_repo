name: Move Important Files

on:
  push:
    branches:
      - main

jobs:
  move-files:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Current Directory
        run: |
          pwd

      - name: Show Repository Structure
        run: |
          echo "===== ALL FILES ====="
          find . -type f | sort

      - name: Find Important Files
        run: |
          echo "===== package.json ====="
          find . -name "package.json"

          echo "===== ui5.yaml ====="
          find . -name "ui5.yaml"

          echo "===== moveToDist.js ====="
          find . -name "moveToDist.js"

      - name: Create Target Folder
        run: |
          mkdir -p target

      - name: Move Files If Found
        run: |
          PACKAGE_FILE=$(find . -name "package.json" | head -n 1)
          UI5_FILE=$(find . -name "ui5.yaml" | head -n 1)
          MOVE_FILE=$(find . -name "moveToDist.js" | head -n 1)

          if [ -n "$PACKAGE_FILE" ]; then
            mv "$PACKAGE_FILE" target/
          fi

          if [ -n "$UI5_FILE" ]; then
            mv "$UI5_FILE" target/
          fi

          if [ -n "$MOVE_FILE" ]; then
            mv "$MOVE_FILE" target/
          fi

      - name: Show Target Folder
        run: |
          echo "===== TARGET ====="
          ls -la target || true

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Move important files"

            git pull --rebase origin main || true

            git push origin HEAD:main || true
          fi
